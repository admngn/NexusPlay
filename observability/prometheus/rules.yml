groups:
  - name: nexusplay.rules
    interval: 30s
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} ({{ $labels.job }}) ne répond plus depuis 2 min."

      - alert: HighCpuUsage
        expr: (100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU élevé sur {{ $labels.instance }}"
          description: "CPU > 80% depuis 5 min ({{ $value | printf \"%.1f\" }}%)."

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disque < 15% sur {{ $labels.instance }}"
          description: "Espace libre {{ $value | printf \"%.1f\" }}%."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Mémoire élevée sur {{ $labels.instance }}"
          description: "RAM utilisée {{ $value | printf \"%.1f\" }}%."

      - alert: BackendAppDown
        expr: up{job="backend-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend NexusPlay injoignable"
          description: "Le backend ne répond plus à Prometheus."
