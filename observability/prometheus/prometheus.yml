global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets:
          - 172.31.83.161:9100  # nginx (host network)
          - 172.31.80.143:9100  # frontend
          - 172.31.85.135:9100  # backend
        labels:
          env: prod

  - job_name: cadvisor
    static_configs:
      - targets:
          - 172.31.83.161:8181  # nginx EC2 host
          - 172.31.80.143:8181  # frontend EC2 host
          - 172.31.85.135:8181  # backend EC2 host
        labels:
          env: prod

  - job_name: backend-app
    metrics_path: /metrics
    static_configs:
      - targets: ['172.31.85.135:8080']
        labels:
          service: backend
