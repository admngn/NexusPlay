global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: critical

receivers:
  - name: default
    # Webhook générique — remplace par Slack/Discord/email selon besoin
    webhook_configs:
      - url: 'http://example.com/webhook'
        send_resolved: true

  - name: critical
    # Slack — décommenter et remplir SLACK_WEBHOOK_URL
    # slack_configs:
    #   - api_url: '${SLACK_WEBHOOK_URL}'
    #     channel: '#nexusplay-alerts'
    #     send_resolved: true
    #     title: '🚨 {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
    webhook_configs:
      - url: 'http://example.com/webhook-critical'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'instance']
